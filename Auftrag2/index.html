<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Twenty One Pilots - Alben</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div>
            <img src="assets/logo.jpg" alt="Twenty one Pilots Logo" class="logo">
        </div>
    </header>

    <main>
        <h1>Alben</h1>
        
        <div class="album-grid">
            <div class="album-item">
                <div class="album-cover">
                    <img src="assets/vessel.jpg" alt="vessel logo">
                </div>

                <div class="album-info">
                    <h2>Vessel</h2>
                    <p>Release: January 2013</p>
                </div>
            </div>

            <div class="album-item">
                <div class="album-cover">
                    <img src="assets/blurryface.jpg" alt="blurryface logo">
                </div>

                <div class="album-info">
                    <h2>Blurryface</h2>
                    <p>Release: May 2015</p>
                </div>
            </div>


            <div class="album-item">
                <div class="album-cover">
                    <img src="assets/trench.jpg" alt="Trench logo">
                </div>

                <div class="album-info">
                    <h2>Trench</h2>
                    <p>Release: October 2018</p>
                </div>
            </div>


            <div class="album-item">
                <div class="album-cover">
                    <img src="assets/scaledAndIcy.jpg" alt="Scaled and icy logo">
                </div>

                <div class="album-info">
                    <h2>Scaled and icy</h2>
                    <p>Release: May 2021</p>
                </div>
            </div>


            <div class="album-item">
                <div class="album-cover">
                    <img src="assets/clancy.jpg" alt="clancy logo">
                </div>

                <div class="album-info">
                    <h2>Clancy</h2>
                    <p>Release: May 2024</p>
                </div>
            </div>


            <div class="album-item">
                <div class="album-cover">
                    <img src="assets/breach.jpg" alt="breach logo">
                </div>

                <div class="album-info">
                    <h2>Breach</h2>
                    <p>Release: September 2025</p>
                </div>
            </div>



        </div>
    </main>

</body>
</html>
